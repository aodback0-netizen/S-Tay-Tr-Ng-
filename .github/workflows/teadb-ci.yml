name: TeaDB Complete CRUD Engine

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  execute-engine:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code dùng v4 để hết cảnh báo Node.js
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Kiểm tra danh sách file ở thư mục gốc để debug
    - name: List Files in Root Directory
      run: ls -la

    # 3. Biên dịch mã C
    - name: Compile C Core Engine
      run: gcc -o teadb main.c

    # 4. Thực thi các lệnh kiểm thử
    - name: Test Functional 1 - Read All
      run: ./teadb read

    - name: Test Functional 2 - Search Keyword
      run: ./teadb search "Tử Sa"

    - name: Test Functional 3 - Sort Database
      run: ./teadb sort

    - name: Test Functional 4 - Filter Price Range
      run: ./teadb filter 500000 1500000
